spring:
  application:
    name: finance-dashboard

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/finance_dashboard}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: true

server:
  port: 8080

app:
  auth:
    registration:
      default-role: VIEWER
      default-status: ACTIVE
      allowed-roles:
        - VIEWER
      allowed-statuses:
        - ACTIVE
  jwt:
    secret: ${APP_JWT_SECRET:ZmluYW5jZWRhc2hib2FyZC1kZW1vLXNlY3JldC1rZXktMzItYnl0ZXM=}
    expiration-minutes: ${APP_JWT_EXPIRATION_MINUTES:120}
  cors:
    allowed-origin-patterns:
      - http://localhost:*
      - http://127.0.0.1:*
      - https://localhost:*
      - https://127.0.0.1:*
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
    exposed-headers:
      - Retry-After
    max-age-seconds: 3600
  rate-limit:
    auth:
      max-requests: 5
      window-seconds: 60
    api:
      max-requests: 120
      window-seconds: 60

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.financedashboard: INFO
    org.springframework.security: WARN
